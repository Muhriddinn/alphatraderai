app = 'alphatraderai'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = false
  min_machines_running = 0
  concurrency = { type = "connections", hard_limit = 25, soft_limit = 20 }

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
